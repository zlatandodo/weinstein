name: Weinstein stage scan

# Refresh the precomputed scan outputs that the Streamlit app reads.
# Runs weekly (weekly bars) after the US cash close, plus on manual dispatch.
on:
  schedule:
    - cron: "0 23 * * 5"   # Fridays 23:00 UTC (~after US close)
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe to scan"
        default: "sp1500"
        type: choice
        options: ["sp500", "sp400", "sp600", "sp1500"]

permissions:
  contents: write   # allow committing the refreshed output/ CSVs

concurrency:
  group: stage-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: |
          python tools/stage_scanner.py \
            --universe "${{ github.event.inputs.universe || 'sp1500' }}" \
            --period 5y --max-workers 8 --no-charts

      - name: Commit refreshed outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/*.csv
          if git diff --cached --quiet; then
            echo "No changes in scan output."
          else
            git commit -m "chore: refresh stage scan ($(date -u +%Y-%m-%d))"
            git push
          fi
